<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SP-WEB MK2</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

:root{
  --bg:#111;
  --body:#1a1a1a;
  --panel:#222;
  --border:#2e2e2e;
  --pad-off:#1c1c1c;
  --oa:#ff6600;
  --ob:#00bbff;
  --lcd-bg:#0b180b;
  --lcd-on:#33ff11;
  --lcd-dim:#1a3a1a;
  --text:#999;
  --bright:#ccc;
  --mono:'Share Tech Mono',monospace;
  --cond:'Barlow Condensed',sans-serif;
}

html,body{
  width:100%;height:100%;
  background:var(--bg);
  overflow:hidden;
  font-family:var(--mono);
  color:var(--text);
  touch-action:none;
}

.unit{
  display:flex;
  flex-direction:column;
  width:100%;
  height:100dvh;
  padding:env(safe-area-inset-top,12px) 12px env(safe-area-inset-bottom,8px) 12px;
  gap:8px;
}

/* ── HEADER ── */
.hdr{
  display:flex;
  gap:10px;
  align-items:stretch;
  flex-shrink:0;
}

.brand{
  display:flex;
  flex-direction:column;
  justify-content:center;
  flex-shrink:0;
}
.brand-sub{font-family:var(--cond);font-size:9px;letter-spacing:4px;color:#444;text-transform:uppercase;}
.brand-name{font-family:var(--cond);font-size:26px;font-weight:900;letter-spacing:1px;color:var(--bright);line-height:1;}
.brand-name span{color:var(--oa);}

.lcd{
  flex:1;
  background:var(--lcd-bg);
  border:1px solid #1a3a1a;
  border-radius:4px;
  padding:8px 10px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-height:60px;
  position:relative;
  overflow:hidden;
}
.lcd::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 3px);
  pointer-events:none;
}
.lcd-label{font-size:9px;color:var(--lcd-dim);letter-spacing:2px;text-transform:uppercase;}
.lcd-main{font-size:14px;color:var(--lcd-on);letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lcd-foot{display:flex;align-items:center;justify-content:space-between;}
.lcd-status{font-size:9px;color:var(--lcd-dim);letter-spacing:2px;}
.lcd-status.play{color:var(--lcd-on);animation:blink 0.9s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

.load-wrap{height:2px;background:#111;border-radius:1px;overflow:hidden;margin-top:4px;}
.load-bar{height:100%;background:var(--lcd-on);width:0%;transition:width 0.15s;}

/* ── CONTROLS ── */
.ctrl{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}

.ab{display:flex;background:#0d0d0d;border:1px solid var(--border);border-radius:3px;overflow:hidden;flex-shrink:0;}
.ab-btn{
  padding:0 18px;
  height:38px;
  font-family:var(--cond);
  font-size:18px;font-weight:900;letter-spacing:2px;
  background:transparent;border:none;color:#444;
  cursor:pointer;transition:all 0.08s;
}
.ab-btn.on-a{background:var(--oa);color:#000;}
.ab-btn.on-b{background:var(--ob);color:#000;}

.stop-btn{
  height:38px;padding:0 14px;
  font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;
  background:#150505;border:1px solid #3a1010;color:#ff3333;
  border-radius:3px;cursor:pointer;flex-shrink:0;
}
.stop-btn:active{background:#ff2222;color:#000;}

.vol-wrap{display:flex;align-items:center;gap:6px;flex:1;justify-content:flex-end;}
.vol-label{font-size:9px;letter-spacing:2px;color:#444;text-transform:uppercase;flex-shrink:0;}
input[type=range].vol{
  flex:1;max-width:100px;
  -webkit-appearance:none;appearance:none;
  height:3px;background:#2a2a2a;border-radius:2px;outline:none;
}
input[type=range].vol::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;
  background:var(--oa);border-radius:50%;cursor:pointer;
}

/* ── PAD GRID ── */
.grid{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  overflow:hidden;
}

.pad{
  background:var(--pad-off);
  border:1px solid #2a2a2a;
  border-radius:5px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:10px 10px 8px;
  position:relative;
  cursor:pointer;
  overflow:hidden;
  transition:border-color 0.05s,background 0.05s;
  min-height:0;
}
.pad::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 25% 25%,rgba(255,255,255,0.03),transparent 60%);
  pointer-events:none;
}

.pad-top{display:flex;align-items:flex-start;justify-content:space-between;}
.pad-num{font-family:var(--cond);font-size:13px;font-weight:700;color:#3a3a3a;letter-spacing:1px;}
.pad-edit{
  width:22px;height:22px;
  background:transparent;border:1px solid #333;border-radius:3px;
  color:#444;font-size:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:border-color 0.1s,color 0.1s;
  position:relative;z-index:2;
}
.pad-edit:active{border-color:#888;color:#aaa;}

.pad-mid{flex:1;display:flex;align-items:center;padding:4px 0;}
.pad-bar{height:2px;background:#222;border-radius:1px;width:100%;overflow:hidden;}
.pad-bar-inner{height:100%;background:var(--oa);width:0;transition:width 0.1s;}

.pad-label{font-size:10px;letter-spacing:0.5px;color:#444;text-transform:uppercase;line-height:1.2;}
.pad-offset{font-size:9px;color:#333;margin-top:2px;letter-spacing:1px;}

.pad.ok::after{
  content:'';position:absolute;top:8px;right:32px;
  width:4px;height:4px;border-radius:50%;background:#2a5a2a;
}
.pad.err::after{content:'';position:absolute;top:8px;right:32px;width:4px;height:4px;border-radius:50%;background:#5a1a1a;}

.pad.pa{
  background:#1e0d00;
  border-color:var(--oa);
  box-shadow:0 0 0 1px var(--oa),inset 0 0 24px rgba(255,80,0,0.1);
}
.pad.pa .pad-num{color:var(--oa);}
.pad.pa .pad-label{color:#884400;}
.pad.pa .pad-bar-inner{background:var(--oa);}

.pad.pb{
  background:#001520;
  border-color:var(--ob);
  box-shadow:0 0 0 1px var(--ob),inset 0 0 24px rgba(0,140,220,0.1);
}
.pad.pb .pad-num{color:var(--ob);}
.pad.pb .pad-label{color:#005577;}
.pad.pb .pad-bar-inner{background:var(--ob);}

/* ── EDIT SHEET ── */
.sheet-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.7);
  opacity:0;pointer-events:none;
  transition:opacity 0.2s;
  z-index:100;
}
.sheet-overlay.open{opacity:1;pointer-events:auto;}

.sheet{
  position:fixed;bottom:0;left:0;right:0;
  background:#1a1a1a;
  border-top:1px solid #333;
  border-radius:16px 16px 0 0;
  padding:0 16px env(safe-area-inset-bottom,16px);
  transform:translateY(100%);
  transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);
  z-index:101;
  max-height:70vh;
}
.sheet.open{transform:translateY(0);}

.sheet-handle{
  width:36px;height:4px;background:#333;border-radius:2px;
  margin:12px auto 16px;
}

.sheet-title{
  font-family:var(--cond);font-size:11px;font-weight:700;
  letter-spacing:3px;color:#555;text-transform:uppercase;
  margin-bottom:16px;
}

.sheet-pad-name{
  font-family:var(--cond);font-size:22px;font-weight:900;
  color:var(--bright);letter-spacing:1px;margin-bottom:20px;
}
.sheet-pad-name span{color:var(--oa);}
.side-b-active .sheet-pad-name span{color:var(--ob);}

.edit-row{
  display:flex;align-items:center;gap:12px;margin-bottom:16px;
}
.edit-lbl{font-size:10px;letter-spacing:2px;color:#555;text-transform:uppercase;width:60px;flex-shrink:0;}
.edit-time{font-size:13px;color:var(--lcd-on);width:64px;flex-shrink:0;text-align:right;}

input[type=range].start-sl{
  flex:1;
  -webkit-appearance:none;appearance:none;
  height:4px;border-radius:2px;background:#2a2a2a;outline:none;
}
input[type=range].start-sl::-webkit-slider-thumb{
  -webkit-appearance:none;width:22px;height:22px;
  background:var(--oa);border-radius:50%;cursor:pointer;
}
.side-b-active input[type=range].start-sl::-webkit-slider-thumb{background:var(--ob);}

.waveform-display{
  height:48px;background:#111;border-radius:4px;margin-bottom:16px;
  border:1px solid #222;display:flex;align-items:center;
  justify-content:center;overflow:hidden;position:relative;
}
.wf-canvas{width:100%;height:100%;}

.start-line{
  position:absolute;top:0;bottom:0;width:2px;
  background:var(--oa);
  pointer-events:none;
}
.side-b-active .start-line{background:var(--ob);}

.sheet-btns{display:flex;gap:8px;margin-top:8px;}
.sh-btn{
  flex:1;height:44px;
  font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;
  background:#111;border:1px solid #333;color:var(--text);
  border-radius:4px;cursor:pointer;
}
.sh-btn.reset{color:#ff5555;border-color:#3a1515;}
.sh-btn.close{color:#aaa;border-color:#333;}
.sh-btn:active{opacity:0.7;}
</style>
</head>
<body>

<div class="unit" id="unit">
  <!-- HEADER -->
  <div class="hdr">
    <div class="brand">
      <div class="brand-sub">Web Sampler</div>
      <div class="brand-name">SP-WEB<span>2</span></div>
    </div>
    <div class="lcd">
      <div class="lcd-label" id="lcd-side">SIDE — A</div>
      <div class="lcd-main" id="lcd-track">-- READY --</div>
      <div class="lcd-foot">
        <div class="lcd-status" id="lcd-st">STANDBY</div>
      </div>
      <div class="load-wrap"><div class="load-bar" id="lb"></div></div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="ctrl">
    <div class="ab">
      <button class="ab-btn on-a" id="btn-a" onclick="setSide('A')">A</button>
      <button class="ab-btn" id="btn-b" onclick="setSide('B')">B</button>
    </div>
    <button class="stop-btn" onclick="stopAll()">■ STOP</button>
    <div class="vol-wrap">
      <span class="vol-label">VOL</span>
      <input type="range" class="vol" min="0" max="1" step="0.01" value="0.9" oninput="setVol(this.value)">
    </div>
  </div>

  <!-- PAD GRID -->
  <div class="grid" id="grid"></div>
</div>

<!-- EDIT SHEET -->
<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">START POINT EDIT</div>
  <div class="sheet-pad-name" id="sh-name"><span>#1</span> LOOP</div>
  <div class="waveform-display">
    <canvas class="wf-canvas" id="wf-canvas"></canvas>
    <div class="start-line" id="start-line" style="left:0%"></div>
  </div>
  <div class="edit-row">
    <span class="edit-lbl">START</span>
    <input type="range" class="start-sl" id="start-sl" min="0" max="100" step="0.1" value="0" oninput="onSlider(this.value)">
    <span class="edit-time" id="edit-time">0.000s</span>
  </div>
  <div class="edit-row">
    <span class="edit-lbl">DURATION</span>
    <span class="edit-time" id="dur-time" style="margin-left:auto">—</span>
  </div>
  <div class="sheet-btns">
    <button class="sh-btn reset" onclick="resetStart()">RESET</button>
    <button class="sh-btn close" onclick="closeSheet()">CLOSE</button>
  </div>
</div>

<script>
const TRACKS = {
  A:['GlitchLoop1.wav','GlitchLoop2.wav','GlitchLoop3.wav','GlitchLoop4.wav','GlitchLoop5.wav',
     'Loop1.wav','Loop2.wav','Loop3.wav','Loop4.wav','Loop5.wav'],
  B:['Loop6.wav','Loop7.wav','Loop8.wav','Loop9.wav','Loop10.wav',
     'Loop11.wav','Loop12.wav','Loop13.wav','Loop14.wav','Loop15.wav']
};
const FOLDER='dnb/';

let ctx=null,gainNode=null;
let buffers={A:new Array(10).fill(null),B:new Array(10).fill(null)};
let startPts={A:new Array(10).fill(0),B:new Array(10).fill(0)};
let curSrc=null,curPadEl=null,curSide='A';
let editSide='A',editIdx=0;
let playInterval=null;

function initAudio(){
  if(ctx)return;
  ctx=new(window.AudioContext||window.webkitAudioContext)({latencyHint:'interactive'});
  gainNode=ctx.createGain();
  gainNode.gain.value=0.9;
  gainNode.connect(ctx.destination);
}

function setVol(v){if(gainNode)gainNode.gain.setTargetAtTime(parseFloat(v),ctx.currentTime,0.01);}

async function loadAll(){
  initAudio();
  let done=0;
  const bar=document.getElementById('lb');
  setLcd('SIDE: A','-- LOADING --','BUFFERING...',false);
  for(const s of['A','B']){
    for(let i=0;i<TRACKS[s].length;i++){
      const url=FOLDER+TRACKS[s][i];
      const el=document.querySelector(`[data-s="${s}"][data-i="${i}"]`);
      try{
        const r=await fetch(url);
        if(!r.ok)throw 0;
        const ab=await r.arrayBuffer();
        buffers[s][i]=await ctx.decodeAudioData(ab);
        el&&el.classList.add('ok');
      }catch(e){el&&el.classList.add('err');}
      done++;
      bar.style.width=(done/20*100)+'%';
    }
  }
  setLcd('SIDE: A','-- READY --','LOADED '+done+'/20',false);
}

function playPad(side,idx){
  initAudio();
  if(ctx.state==='suspended')ctx.resume();
  stopCurrent();
  const buf=buffers[side][idx];
  if(!buf){setLcd('ERR',TRACKS[side][idx],'NO BUFFER',false);return;}
  const offset=startPts[side][idx]||0;
  const src=ctx.createBufferSource();
  src.buffer=buf;src.loop=false;
  src.connect(gainNode);
  src.start(0,offset);
  src.onended=()=>{
    if(curSrc===src){curSrc=null;clearPadGlow();setLcd('SIDE: '+curSide,'-- READY --','STOPPED',false);}
  };
  curSrc=src;
  const el=document.querySelector(`[data-s="${side}"][data-i="${idx}"]`);
  curPadEl=el;
  if(el){el.classList.add(side==='A'?'pa':'pb');}
  const name=TRACKS[side][idx].replace('.wav','');
  setLcd('SIDE: '+side,name,'▶ PLAYING',true);
  curSide=side;
}

function stopCurrent(){
  if(curSrc){try{curSrc.stop(0);}catch(e){}curSrc.disconnect();curSrc=null;}
  clearPadGlow();
}
function stopAll(){stopCurrent();setLcd('SIDE: '+curSide,'-- READY --','STOPPED',false);}
function clearPadGlow(){if(curPadEl){curPadEl.classList.remove('pa','pb');curPadEl=null;}}

function setSide(s){
  curSide=s;
  document.getElementById('btn-a').className='ab-btn'+(s==='A'?' on-a':'');
  document.getElementById('btn-b').className='ab-btn'+(s==='B'?' on-b':'');
  document.getElementById('lcd-side').textContent='SIDE — '+s;
  renderGrid();
}

function setLcd(side,main,st,playing){
  document.getElementById('lcd-side').textContent=side;
  document.getElementById('lcd-track').textContent=main;
  const el=document.getElementById('lcd-st');
  el.textContent=st;el.className='lcd-status'+(playing?' play':'');
}

function renderGrid(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  TRACKS[curSide].forEach((name,i)=>{
    const pad=document.createElement('div');
    pad.className='pad';
    pad.dataset.s=curSide;pad.dataset.i=i;
    if(buffers[curSide][i])pad.classList.add('ok');

    const off=startPts[curSide][i];
    const offStr=off>0?off.toFixed(2)+'s':'';

    pad.innerHTML=`
      <div class="pad-top">
        <div class="pad-num">${String(i+1).padStart(2,'0')}</div>
        <button class="pad-edit" data-es="${curSide}" data-ei="${i}">✎</button>
      </div>
      <div class="pad-mid"><div class="pad-bar"><div class="pad-bar-inner"></div></div></div>
      <div>
        <div class="pad-label">${name.replace('.wav','')}</div>
        <div class="pad-offset">${offStr?'▶ '+offStr:''}</div>
      </div>`;

    pad.addEventListener('pointerdown',e=>{
      if(e.target.classList.contains('pad-edit'))return;
      e.preventDefault();
      playPad(curSide,i);
    });
    pad.querySelector('.pad-edit').addEventListener('pointerdown',e=>{
      e.stopPropagation();e.preventDefault();
      openSheet(curSide,i);
    });

    if(curPadEl&&curPadEl.dataset.s===curSide&&parseInt(curPadEl.dataset.i)===i){
      pad.classList.add(curSide==='A'?'pa':'pb');
      curPadEl=pad;
    }
    grid.appendChild(pad);
  });
}

/* ── EDIT SHEET ── */
function openSheet(side,idx){
  editSide=side;editIdx=idx;
  const name=TRACKS[side][idx].replace('.wav','');
  const buf=buffers[side][idx];
  const sheet=document.getElementById('sheet');
  const overlay=document.getElementById('overlay');

  document.getElementById('sh-name').innerHTML=`<span>#${idx+1}</span> ${name}`;
  sheet.className='sheet'+(side==='B'?' side-b-active':'')+' open';
  overlay.classList.add('open');

  if(buf){
    const dur=buf.duration;
    const sl=document.getElementById('start-sl');
    sl.max=dur;sl.step=0.001;
    sl.value=startPts[side][idx]||0;
    updateSliderDisplay(sl.value,dur);
    drawWaveform(buf);
  }else{
    document.getElementById('edit-time').textContent='N/A';
    document.getElementById('dur-time').textContent='NOT LOADED';
  }
}

function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  renderGrid();
}

function onSlider(v){
  const val=parseFloat(v);
  startPts[editSide][editIdx]=val;
  const buf=buffers[editSide][editIdx];
  if(buf)updateSliderDisplay(val,buf.duration);
}

function updateSliderDisplay(val,dur){
  document.getElementById('edit-time').textContent=parseFloat(val).toFixed(3)+'s';
  document.getElementById('dur-time').textContent=dur.toFixed(2)+'s';
  const pct=(parseFloat(val)/dur*100);
  document.getElementById('start-line').style.left=Math.min(pct,99)+'%';
}

function resetStart(){
  startPts[editSide][editIdx]=0;
  const sl=document.getElementById('start-sl');
  sl.value=0;
  const buf=buffers[editSide][editIdx];
  if(buf)updateSliderDisplay(0,buf.duration);
}

function drawWaveform(buf){
  const canvas=document.getElementById('wf-canvas');
  const W=canvas.offsetWidth,H=canvas.offsetHeight;
  canvas.width=W;canvas.height=H;
  const ctx2=canvas.getContext('2d');
  const data=buf.getChannelData(0);
  const step=Math.ceil(data.length/W);
  const col=editSide==='A'?'#ff6600':'#00bbff';
  ctx2.clearRect(0,0,W,H);
  ctx2.strokeStyle=col;ctx2.lineWidth=1;
  ctx2.beginPath();
  for(let x=0;x<W;x++){
    let min=1,max=-1;
    for(let j=0;j<step;j++){
      const s=data[x*step+j]||0;
      if(s<min)min=s;if(s>max)max=s;
    }
    const y1=(1+min)/2*H,y2=(1+max)/2*H;
    ctx2.moveTo(x,y1);ctx2.lineTo(x,y2);
  }
  ctx2.stroke();
}

/* keyboard (for testing on desktop) */
document.addEventListener('keydown',e=>{
  if(e.repeat)return;
  const m={'1':0,'2':1,'3':2,'4':3,'5':4,'6':5,'7':6,'8':7,'9':8,'0':9};
  if(e.key in m)playPad(curSide,m[e.key]);
  if(e.key==='a'||e.key==='A')setSide('A');
  if(e.key==='b'||e.key==='B')setSide('B');
  if(e.key===' '){e.preventDefault();stopAll();}
});

/* init */
renderGrid();
setTimeout(()=>{initAudio();loadAll();},80);
</script>
</body>
</html>
